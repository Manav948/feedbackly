<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Rounded square white background -->
  <rect width="512" height="512" rx="140" fill="#FFFFFF" stroke="#E2E2E2" stroke-width="12"/>
  
  <!-- Outer subtle tech-grid background lines inside the icon -->
  <line x1="256" y1="64" x2="256" y2="448" stroke="rgba(0,0,0,0.03)" stroke-width="2"/>
  <line x1="64" y1="256" x2="448" y2="256" stroke="rgba(0,0,0,0.03)" stroke-width="2"/>
  <circle cx="256" cy="256" r="160" stroke="rgba(0,0,0,0.03)" stroke-width="2" stroke-dasharray="8 8"/>

  <!-- Chat bubble silhouette with black outline -->
  <path d="M190 350 L120 400 V330 C90 300 70 260 70 210 C70 120 150 50 250 50 C350 50 430 120 430 210 C430 300 350 370 250 370 C228 370 208 363 190 350 Z" 
        fill="#FAFAFA" 
        stroke="#090909" 
        stroke-width="8" 
        stroke-linejoin="round"/>

  <!-- Centered Segmented Feedback Ring (Dark Loop) -->
  <g stroke="#090909" stroke-width="16" stroke-linecap="round" opacity="0.95">
    <!-- Arc 1 -->
    <path d="M 200 180 A 70 70 0 0 1 312 180" fill="none" />
    <!-- Arc 2 -->
    <path d="M 326 210 A 70 70 0 0 1 290 310" fill="none" />
    <!-- Arc 3 -->
    <path d="M 256 326 A 70 70 0 0 1 186 256" fill="none" />
  </g>

  <!-- Premium Center dot / core highlight -->
  <circle cx="256" cy="245" r="14" fill="#090909" />
</svg>
